                            22:10 · Go to channel. Steve Jobs&#39; 2005 ...
                          time: '2024-11-29T03:54:26Z'
                          image:
                            url: >-
                              https://i.ytimg.com/vi/UF8uR6Z6KLc/hqdefault.jpg?sqp=-oaymwEmCOADEOgC8quKqQMa8AEB-AG-AoAC8AGKAgwIABABGGUgTShAMA8=&rs=AOn4CLBQpu5eC9IARIhuqaqee1Zc53SWpw
                            height: 480
                            width: 360
                          props:
                            hires_thumbnail_url: https://i.ytimg.com/vi/UF8uR6Z6KLc/hqdefault.jpg
